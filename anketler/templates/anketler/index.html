{% load static %}

<link rel="stylesheet" href="{% static 'anketler/style.css' %}">

{% if latest_question_list %}
    <ul>
    {% for question in latest_question_list %}
        <li><a href="{% url 'anketler:detail' question.id %}">{{ question.question_text }}</a></li>
    {% endfor %}
    </ul>
{% else %}
    <p>No anketler are available.</p>
{% endif %}
