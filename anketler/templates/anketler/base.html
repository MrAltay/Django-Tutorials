{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Anket Sistemi{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'anketler/style.css' %}">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'dark';
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
</head>
<body>
    <div class="background-particles" id="particles"></div>
    
    <div class="theme-toggle-container">
        <button class="theme-toggle-btn" id="theme-toggle" aria-label="Temayı Değiştir">
            <span class="moon">🌙</span>
            <span class="sun">☀️</span>
        </button>
    </div>

    <div class="app-container">
        {% block content %}
        {% endblock %}
    </div>
    <script>
        // Theme Toggle Logic
        document.getElementById('theme-toggle').addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'light') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            }
        });

        // Particles
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('particles');
            const count = 50;
            
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                const size = Math.random() > 0.8 ? 'lg' : (Math.random() > 0.5 ? 'md' : 'sm');
                particle.className = `particle particle-${size}`;
                
                // Random position
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.top = Math.random() * 100 + 'vh';
                
                // Random animation duration and delay
                const duration = 15 + Math.random() * 20;
                const delay = Math.random() * -20;
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = delay + 's';
                
                // Random opacity
                particle.style.opacity = 0.1 + Math.random() * 0.4;
                
                container.appendChild(particle);
            }
        });
    </script>
</body>
</html>
